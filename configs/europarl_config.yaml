write_jsonl: true

download_cfg:
  dataset: Helsinki-NLP/europarl
  config: de-en
  split: train
  max_examples: 1000

norm_cfg:
  changes:
    - strip_edges
    - remove_control_chars
    - collapse_whitespace
    - normalize_unicode_quotes

tokenize_cfg:
  tokenizer_model_name: Helsinki-NLP/opus-mt-de-en
  max_src_len: null

map_cfg:
  src_lang: de
  tgt_lang: en
